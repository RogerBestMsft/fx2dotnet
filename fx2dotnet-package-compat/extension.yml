schema_version: "1.0"

extension:
  id: "fx2dotnet-package-compat"
  name: "fx2dotnet Package Compatibility"
  version: "1.0.0"
  description: "Phase 4 — Apply chunked NuGet package compatibility updates from the migration plan. Executes updates in risk-ordered chunks and invokes Build Fix after each chunk."
  author: "RogerBestMSFT"
  repository: "https://github.com/RogerBestMSFT/fx2dotnet"
  license: "MIT"
  homepage: "https://github.com/RogerBestMSFT/fx2dotnet/tree/main/fx2dotnet-package-compat"

requires:
  speckit_version: ">=0.2.0,<2.0.0"
  tools:
    - name: "Swick.Mcp.Fx2dotnet"
      version: ">=0.1.0"
      required: true
  commands:
    - "speckit.fx2dotnet-support-core.resolve-solution-context"
    - "speckit.fx2dotnet-build-fix.diagnose-build"
    - "speckit.fx2dotnet-build-fix.apply-fix-pattern"
    - "speckit.fx2dotnet-build-fix.retry-build"

provides:
  commands:
    - name: "speckit.fx2dotnet-package-compat.apply-package-chunk"
      file: "commands/apply-package-chunk.md"
      description: "Apply one chunk of package version updates to the solution"

    - name: "speckit.fx2dotnet-package-compat.validate-package-updates"
      file: "commands/validate-package-updates.md"
      description: "Validate package-updates.md execution ledger for consistency and completeness"

    - name: "speckit.fx2dotnet-package-compat.record-package-status"
      file: "commands/record-package-status.md"
      description: "Record the result of a completed chunk into package-updates.md"

  config:
    - name: "fx2dotnet-package-compat-config.yml"
      template: "fx2dotnet-package-compat-config.template.yml"
      description: "Package compatibility configuration (continuation preferences)"
      required: false

tags:
  - "dotnet"
  - "migration"
  - "modernization"
  - "packages"
  - "nuget"
  - "compatibility"

defaults:
  package_compat:
    always_continue: false
    stop_on_risky_substitution: true
    prefer_central_package_management: true
