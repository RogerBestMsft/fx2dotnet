schema_version: "1.0"

extension:
  id: "dotnet-fx-migration"
  name: ".NET Framework to Modern .NET Migration"
  version: "0.1.0"
  description: "Orchestrates end-to-end .NET Framework to modern .NET migration via a 7-phase workflow: assessment, planning, SDK conversion, package compatibility, multitargeting, and ASP.NET Core migration."
  author: "fx2dotnet"
  repository: "https://github.com/RogerBestMSFT/fx2dotnet"
  license: "MIT"

requires:
  speckit_version: ">=0.1.0"

provides:
  commands:
    - name: "speckit.dotnet-fx-migration.run"
      file: "../../agents/dotnet-fx-to-modern-dotnet.md"
      description: "Start or resume a full .NET Framework to modern .NET migration for a solution."

tags:
  - "dotnet"
  - "migration"
  - "modernization"
  - "aspnet"