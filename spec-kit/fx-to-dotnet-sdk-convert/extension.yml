schema_version: "1.0"
extension:
  id: "fx-to-dotnet-sdk-convert"
  name: ".NET SDK-Style Project Conversion"
  version: "0.1.0"
  description: "Convert legacy .NET Framework project file to SDK-style format; validate with build-fix"
  author: "Microsoft"
  repository: "https://github.com/AzureAD/fx-to-dotnet-extensions"
  license: "MIT"
requires:
  speckit_version: ">=0.5.0"
  tools:
    - "Microsoft.GitHubCopilot.AppModernization.Mcp"
    - "Swick.Mcp.Fx2dotnet"
provides:
  commands:
    - name: "speckit.fx-to-dotnet-sdk-convert.convert"
      file: "commands/convert.md"
