name: Speckit Extensions Deploy

on:
  push:
    branches:
      - main
      - spec-kit-multi-ext
    tags:
      - "speckit-*"
    paths:
      - "speckit-extensions/**"
      - "agents/**"
      - ".github/scripts/**"
      - ".github/workflows/speckit-deploy.yml"
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish deployment bundle as a GitHub prerelease"
        required: true
        default: false
        type: boolean
      release_tag:
        description: "Optional release tag for manual publish (for example: speckit-spec-kit-multi-ext-42)"
        required: false
        type: string

jobs:
  bundle:
    name: Bundle Speckit Extensions
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    outputs:
      bundle_name: ${{ steps.bundle_name.outputs.value }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Compute bundle name
        id: bundle_name
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::8}"
          ref_safe="$(echo "${GITHUB_REF_NAME}" | tr '/_' '-' | tr -cd '[:alnum:]-')"
          echo "value=speckit-extension-zips-${ref_safe}-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Create per-extension deployment bundles
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/extensions

          while IFS= read -r extension_yml; do
            extension_dir="$(dirname "${extension_yml}")"
            extension_name="$(basename "${extension_dir}")"
            zip_name="${extension_name}.zip"

            # Zip from inside each extension directory so extension.yml is at the zip root.
            (
              cd "${extension_dir}"
              zip -r "../../artifacts/extensions/${zip_name}" .
            )
          done < <(find speckit-extensions -mindepth 2 -maxdepth 2 -type f -name extension.yml | sort)

      - name: Upload deployment bundles artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ steps.bundle_name.outputs.value }}
          path: |
            artifacts/extensions/*.zip
          if-no-files-found: error

  publish_release:
    name: Publish Speckit Deployment Prerelease
    runs-on: ubuntu-latest
    needs: bundle
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish_release == true)
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download deployment bundles artifact
        uses: actions/download-artifact@v5
        with:
          name: ${{ needs.bundle.outputs.bundle_name }}
          path: artifacts

      - name: Generate release notes
        id: release_notes
        shell: bash
        run: |
          set -euo pipefail

          # Find the previous speckit release tag on this branch, fall back to the
          # first commit if none exists yet.
          ref_safe="$(echo "${GITHUB_REF_NAME}" | tr '/_' '-' | tr -cd '[:alnum:]-')"
          prev_tag="$(git tag --list "speckit-${ref_safe}-*" --sort=-version:refname | head -1)"

          if [ -n "${prev_tag}" ]; then
            range="${prev_tag}..HEAD"
          else
            range="HEAD"
          fi

          # Extension versions from catalog-fragment.json
          ext_table="$(jq -r '
            .extensions | to_entries[] |
            "| \(.value.id) | \(.value.version) |"
          ' speckit-extensions/catalog-fragment.json)"

          # Commits touching speckit-extensions/ or agents/ since last release
          commit_log="$(git log "${range}" --oneline -- speckit-extensions/ agents/ 2>/dev/null || true)"

          notes="## Extensions included

          | Extension | Version |
          |---|---|
          ${ext_table}

          ## Changes since last release

          $([ -n "${commit_log}" ] && echo "${commit_log}" || echo "_No prior release on this branch — initial deployment._")

          ---
          Branch: \`${GITHUB_REF_NAME}\`
          Commit: \`${GITHUB_SHA}\`
          Run: [#${GITHUB_RUN_NUMBER}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})"

          # Write to a file to avoid quoting issues with gh release create
          echo "${notes}" > artifacts/release-notes.md

      - name: Create GitHub release and upload bundles
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          ref_safe="$(echo "${GITHUB_REF_NAME}" | tr '/_' '-' | tr -cd '[:alnum:]-')"
          manual_tag="${{ inputs.release_tag }}"
          mapfile -t zip_assets < <(find artifacts -type f -name '*.zip' | sort)
          if [ ${#zip_assets[@]} -eq 0 ]; then
            echo "No extension bundle zip files were found under artifacts"
            exit 1
          fi

          mkdir -p artifacts/extensions
          for zip_asset in "${zip_assets[@]}"; do
            cp "${zip_asset}" "artifacts/extensions/$(basename "${zip_asset}")"
          done

          assets=(
            artifacts/extensions/*.zip
          )

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            if [ -n "${manual_tag}" ]; then
              tag="${manual_tag}"
            else
              tag="speckit-${ref_safe}-${GITHUB_RUN_NUMBER}"
            fi
          fi

          mkdir -p artifacts/deployment-scripts
          mapfile -t zip_names < <(find artifacts/extensions -maxdepth 1 -type f -name '*.zip' -printf '%f\n' | sort)

          bash_script="artifacts/deployment-scripts/deploy-extension-zips-${tag}.sh"
          ps1_script="artifacts/deployment-scripts/deploy-extension-zips-${tag}.ps1"
          release_base_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${tag}"

          {
            echo '#!/usr/bin/env bash'
            echo 'set -euo pipefail'
            echo
            echo "release_base_url=\"${release_base_url}\""
            echo 'assets=('
            for zip_name in "${zip_names[@]}"; do
              echo "  \"${zip_name}\""
            done
            echo ')'
            echo
            echo 'if ! command -v specify >/dev/null 2>&1; then'
            echo '  echo "The '\''specify'\'' CLI is not installed or not on PATH."'
            echo '  exit 1'
            echo 'fi'
            echo
            echo 'for asset in "${assets[@]}"; do'
            echo '  extension_name="${asset%.zip}"'
            echo '  asset_url="${release_base_url}/${asset}"'
            echo '  echo "Deploying ${extension_name} from ${asset_url}"'
            echo '  specify extension add "${extension_name}" --from "${asset_url}"'
            echo 'done'
          } > "${bash_script}"

          {
            echo '[CmdletBinding()]'
            echo 'param()'
            echo
            echo '$ErrorActionPreference = "Stop"'
            echo
            echo '$specify = Get-Command -Name specify -ErrorAction SilentlyContinue'
            echo 'if (-not $specify) {'
            echo '    Write-Error "The '\''specify'\'' CLI is not installed or not on PATH."'
            echo '}'
            echo
            echo "\$releaseBaseUrl = \"${release_base_url}\""
            echo '$assets = @('
            for zip_name in "${zip_names[@]}"; do
              echo "    \"${zip_name}\"," 
            done
            echo ')'
            echo
            echo 'foreach ($asset in $assets) {'
            echo '    $extensionName = [System.IO.Path]::GetFileNameWithoutExtension($asset)'
            echo '    $assetUrl = "$releaseBaseUrl/$asset"'
            echo '    Write-Host "Deploying $extensionName from $assetUrl"'
            echo '    specify extension add $extensionName --from $assetUrl'
            echo '}'
          } > "${ps1_script}"

          chmod +x "${bash_script}"

          assets+=("${bash_script}" "${ps1_script}")

          title="Speckit deployment bundle (${tag})"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            gh release create "${tag}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${title}" \
              --notes-file artifacts/release-notes.md \
              "${assets[@]}"
          else
            gh release create "${tag}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${title}" \
              --notes-file artifacts/release-notes.md \
              --prerelease \
              "${assets[@]}"
          fi